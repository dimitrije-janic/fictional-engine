{{- range .Values.apps }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.spec.project }}
  {{- if .chart }}
  source:
    chart: {{ .chart }}
    repoURL: {{ .repoURL }}
    targetRevision: {{ .targetRevision }}
    helm:
      releaseName: {{ .name }}
      {{- if .valuesFile }}
      values: |
        {{- $.Files.Get .valuesFile | nindent 8 }}
      {{- else if .values }}
      values: |
        {{- .values | nindent 8 }}
      {{- end }}
  {{- else }}
  source:
    repoURL: {{ $.Values.spec.source.repoURL }}
    targetRevision: {{ $.Values.spec.source.targetRevision }}
    path: {{ .path }}
    helm:
      releaseName: {{ .name }}
      {{- if .valueFiles }}
      valueFiles:
        {{- toYaml .valueFiles | nindent 8 }}
      {{- end }}
  {{- end }}
  destination:
    server: {{ $.Values.spec.destination.server }}
    namespace: {{ .namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      {{- range .syncOptions }}
      - {{ . }}
      {{- end }}
{{- end }}
