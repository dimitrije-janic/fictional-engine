{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "backend.fullname" . }}-db
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "backend.fullname" . }}-db
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecret.rdsSecretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.rdsSecretName }}
        property: password
{{- end }}
