server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /servers {
        proxy_pass http://api:8000;
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
