name: CI

on:
  workflow_dispatch:
  push:
    branches: [ 'main' ]
    tags-ignore: [ '*' ]
    paths: [ 'backend/**', 'frontend/**' ]
  pull_request:
    branches: [ 'main' ]
    paths: [ 'backend/**', 'frontend/**' ]

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/react
            p/security-audit
            p/owasp-top-ten

  backend-test:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: inventory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
        run: pytest -v backend/tests/ -m "not integration" --junitxml=test-results.xml

      - name: Test report
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f
        if: always()
        with:
          name: Backend Test Results
          path: test-results.xml
          reporter: java-junit

  backend-build:
    name: Build Backend
    uses: ./.github/workflows/build-docker.yml
    needs: [ backend-test, sast ]
    secrets: inherit
    with:
      service-name: 'backend'
      push: ${{ github.event_name != 'pull_request' }}

  frontend-lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  frontend-build:
    name: Build Frontend
    uses: ./.github/workflows/build-docker.yml
    needs: [ frontend-lint, sast ]
    secrets: inherit
    with:
      service-name: 'frontend'
      push: ${{ github.event_name != 'pull_request' }}
